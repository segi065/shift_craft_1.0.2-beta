<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

    <body>

        <div id="name" class="mb-2 text-bold"></div>
        <div id="dates" class="mb-2"></div>

        <button class="btn btn-primary w-100 mt-3" onclick="save()">保存</button>

        <template id="date-template">
            <div class="date_block mb-1 ms-2">
                <div class="date"></div>
                <div class="m-1 ms-2 times"></div>

                <button class="btn btn-sm btn-secondary ms-2 add_time">＋追加</button>
            </div>

        </template>

        <template id="time-template">
            <div class="d-flex align-items-center gap-2 ms-2">
                <input class="form-control w-auto start" type="time">-<input class="form-control w-auto end" type="time">
            </div>
        </template>


        <script>
            let lastupdate = 0;

            setInterval(load, 5000);

            function load() {
                google.script.run.withSuccessHandler(data => {
                if (!data) return;

                const parsedData = JSON.parse(data);

                if(parsedData.update !== lastupdate) {
                    lastupdate = parsedData.update;
                    document.getElementById("name").innerText = parsedData.name;
                    document.getElementById("dates").replaceChildren();

                    console.log(parsedData.dates);
                    parsedData.dates.forEach(date => {
                        const date_template = document.getElementById("date-template");
                        const date_clone = date_template.content.cloneNode(true);

                        const date_element = date_clone.firstElementChild;
                        date_element.querySelector(".date").innerText = date;

                        const times_container = date_element.querySelector(".times");
                        search_requests(parsedData.name, date, (times) => {
                            console.log("date loop");
                            times.forEach(time => {
                                console.log("time loop");
                                const time_template = document.getElementById("time-template");
                                const time_clone = time_template.content.cloneNode(true);

                                time_clone.querySelector(".start").value = time[0];
                                time_clone.querySelector(".end").value = time[1];
                                times_container.appendChild(time_clone);
                            });
                        });

                        document.getElementById("dates").appendChild(date_clone);
                    });
                };
                }).get_selected_data();
            };

            function search_requests(name, date, callback) {
                google.script.run.withSuccessHandler(data => {
                    const search = [];

                    data.forEach(request => {
                        if(request[0].trim() !== name.trim()) return;
                        if(request[1].trim() !== date.trim()) return;
                        search.push([
                            request[2],
                            request[3]
                        ]);
                    });
                    callback(search);
                }).search_requests();
            };

            function submit() {
                const start = document.getElementById("start").value;
                const end = document.getElementById("end").value;

                google.script.run.saveShift(start, end);
            };


            document.addEventListener("click", function(e){
                if(e.target.classList.contains("add_time")) {
                    const template = document.getElementById("time-template");
                    const clone = template.content.cloneNode(true);

                    const el = e.target.closest(".date_block").querySelector(".times");
                    el.appendChild(clone);
                }
            });
        </script>
    </body>
</html>

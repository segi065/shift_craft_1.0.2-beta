<!DOCTYPE html>
<html>
  <head>
    <style>
      body {
        font-family: sans-serif;
        padding: 16px;
      }
      input, button {
        width: 100%;
        margin-top: 10px;
        padding: 8px;
        font-size: 16px;
      }
      button {
        background: #4285f4;
        color: white;
        border: none;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h3>時間を入力</h3>

    <input type="time" id="time">

    <button onclick="save()">保存</button>

    <script>
      function save() {
        const time = document.getElementById('time').value;
        google.script.run.saveTime(time);
        google.script.host.close();
      }
    </script>
  </body>
</html>

    <script>
        const staffdata = JSON.parse("<?= JSON.stringify(data) ?>");

        staffdata.forEach((row,index) => {
            if(index === 0){
                const thead = document.getElementById("thead");
                const tr_clone = document.getElementById("thead_template").content.cloneNode(true);

                tr_clone.querySelector(".id").textContent = row[0];
                tr_clone.querySelector(".name").textContent = row[1];
                tr_clone.querySelector(".roll").textContent = row[2];

                thead.appendChild(tr_clone);
            }else{
                const tbody = document.getElementById("tbody");
                const tr_clone = document.getElementById("tbody_template").content.cloneNode(true);

                //tr_clone.querySelector(".trow").dataset.id = row[0];
                tr_clone.querySelector(".rowab").dataset.id = row[0];
                tr_clone.querySelector(".id").textContent = row[0];
                tr_clone.querySelector(".name").textContent = row[1];
                tr_clone.querySelector(".roll").textContent = row[2];

                tbody.appendChild(tr_clone);
            };
        });

    </script>

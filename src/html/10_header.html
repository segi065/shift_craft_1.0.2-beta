
<head>
  <base target="_top">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
  <button class="btn btn-primary" type="button"
        data-bs-toggle="offcanvas"
        data-bs-target="#sidebar">
    ☰ メニュー
  </button>

  <div class="offcanvas offcanvas-start" tabindex="-1" id="sidebar">
    <div class="offcanvas-header">
      <h5 class="offcanvas-title">シフト管理アプリ</h5>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
      <div class="d-grid gap-2">

        <button type="button" class="btn btn-primary fs-4" onclick="go('index')">🏠 目次</button>
        <button type="button" class="btn btn-primary fs-4" onclick="go('shiftcraft')">📅 シフト調整</button>
        <button type="button" class="btn btn-primary fs-4" onclick="go('shiftrequest')">📝 シフト要望</button>
        <button type="button" class="btn btn-primary fs-4" onclick="go('staff')">👥 スタッフ</button>
        <button type="button" class="btn btn-primary fs-4" onclick="go('needshift')">📊 スタッフ必要人数</button>

      </div>
    </div>
  </div>

  <div class="card border border-secondary shadow m-3">

    <div class="card-body">
      <div class="row text-center fs-5">
        <div class="col">今日の日付</div>
        <div class="col">スタッフ人数</div>
        <div class="col">次回シフト</div>
      </div>

      <div class="row fw-bold text-center fs-4">
        <div class="col" id="today">-</div>
        <div class="col" id="staff_count">-</div>
        <div class="col" id="next_shift">-</div>
      </div>

    </div>
  </div>

  <script>
    google.script.run
    .withSuccessHandler(showData)
    .getheaderData();

    function showData(data) {
      document.getElementById("today").innerText = data.today;
      document.getElementById("staff_count").innerText = data.staff_count + "人";
      document.getElementById("next_shift").innerText = data.next_shift;
    }

    function go(page) {
      google.script.run.withSuccessHandler(url => {
        window.top.location.href = url + '?page='+page;
      }).getBaseUrl();
    }
  </script>
  
</body>
